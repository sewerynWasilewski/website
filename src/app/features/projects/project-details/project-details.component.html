<div class="docs-page">
  @if (project(); as p) {
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a routerLink="/projects">Projects</a>
      @if (p.id.includes('/')) {
        <span class="breadcrumb-sep">/</span>
        <a [routerLink]="['/projects', p.id.split('/')[0]]">{{ p.id.split('/')[0] | titlecase }}</a>
      }
      <span class="breadcrumb-sep">/</span>
      <span>{{ p.title }}</span>
    </nav>

    <h1>{{ p.title }}</h1>
    <p class="post-meta">{{ p.year }}</p>

    <div class="tag-list">
      @for (tech of p.technologies; track tech) {
        <a class="tag-item" [routerLink]="['/projects']" [queryParams]="{ tech: tech }">
          {{ tech }}
        </a>
      }
    </div>

    <app-markdown-renderer [content]="content()" [basePath]="basePath()"></app-markdown-renderer>
  } @else {
    <h1>Project not found</h1>
    <a routerLink="/projects">← Back to projects</a>
  }
</div>
